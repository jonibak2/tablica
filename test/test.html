<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autocomplete כתובות בישראל</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background: #f9f9f9;
    }
    label {
      display: block;
      margin-bottom: 10px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }
    ul.suggestions {
      list-style: none;
      padding: 0;
      margin-top: 0;
      border: 1px solid #ccc;
      max-height: 200px;
      overflow-y: auto;
      background: #fff;
    }
    ul.suggestions li {
      padding: 10px;
      cursor: pointer;
    }
    ul.suggestions li:hover {
      background: #eee;
    }
  </style>
</head>
<body>

<label for="address">כתובת:</label>
<input type="text" id="address" placeholder="הקלד כתובת..." autocomplete="off">
<ul id="suggestions" class="suggestions"></ul>

<script>
const input = document.getElementById('address');
const suggestionsList = document.getElementById('suggestions');
const GEOAPIFY_API_KEY = 'e8865b54fc1b42bb93563ff017f253af'; // вставьте свой ключ

input.addEventListener('input', async () => {
  const query = input.value;
  if (!query) {
    suggestionsList.innerHTML = '';
    return;
  }

  try {
    const response = await fetch(`https://api.geoapify.com/v1/geocode/autocomplete?text=${encodeURIComponent(query)}&filter=countrycode:il&lang=he&limit=5&apiKey=${GEOAPIFY_API_KEY}`);
    const data = await response.json();

    suggestionsList.innerHTML = '';
    data.features.forEach(feature => {
      const props = feature.properties;
      const street = props.street || '';
      const housenumber = props.housenumber || '';
      const city = props.city || '';
      
      // Формируем только "улица + номер, город"
      const displayText = `${street} ${housenumber}, ${city}`.trim().replace(/^,|,$/g, '');

      const li = document.createElement('li');
      li.textContent = displayText;
      li.addEventListener('click', () => {
        input.value = displayText;
        suggestionsList.innerHTML = '';
      });
      suggestionsList.appendChild(li);
    });
  } catch (err) {
    console.error('Ошибка автозаполнения:', err);
  }
});
</script>

</body>
</html>
